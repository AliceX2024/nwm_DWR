run_name: nwm_cdit_l

# evaluation setup
results_dir: logs
train: False
batch_size: 64
num_workers: 12
model: CDiT-L/2  # 使用 CDiT-L 模型（与预训练权重匹配）
lr: 8e-5

# normalization for the action space
normalize: True
grad_clip_val: 10.0
context_size: 4  # 可以调整：2, 4, 8 等

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: -64
  max_dist_cat: 64

# action output params
len_traj_pred: 64  # 可以调整：16, 32, 64 等

# dataset specific parameters
image_size: 224
datasets:
  recon:
    data_folder: data/recon
    train: data_splits/recon/train/
    test: data_splits/recon/test/
    goals_per_obs: 4

eval_datasets:
  recon:
    data_folder: data/recon          # 指向你的本地/软链数据
    test: data_splits/recon/test/
    goals_per_obs: 4