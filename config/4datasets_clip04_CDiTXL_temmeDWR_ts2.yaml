# 【修改 1】更改实验名称
run_name: 4datasets_clip04_CDiTXL_temmeDWR_ts2

# 【修改 2】指定预训练权重路径
from_checkpoint: "/DATA/DATANAS2/xiaoyj25/projects/nwm/logs/nwm_cdit_xl/checkpoints/0100000.pth.tar"

# 【修改 3】学习率
lr: 2e-6

# --- 以下内容保持与原配置一致 ---
results_dir: logs
train: True
batch_size: 8
num_workers: 12
model: CDiT-XL/2

normalize: True
grad_clip_val: 10.0
context_size: 4

distance:
  min_dist_cat: -64
  max_dist_cat: 64

len_traj_pred: 64

image_size: 224
datasets:
  recon:
    data_folder: data/recon
    train: data_splits/recon/train/
    test: data_splits/recon/test/
    goals_per_obs: 4
  tartan_drive:
    data_folder: data/tartan_drive
    train: my_data_splits/tartan_drive/train/
    test: my_data_splits/tartan_drive/test/
    goals_per_obs: 4
  sacson:
    data_folder: data/sacson
    train: my_data_splits/sacson/train
    test: my_data_splits/sacson/test
    goals_per_obs: 4
  scand:
    data_folder: data/scand
    train: my_data_splits/scand/train
    test: my_data_splits/scand/test
    goals_per_obs: 4

# === [修改] Reweighting 关键参数 ===
reweight:
  enable: True
  use_spacetime: True
  pool_type: adaptive_2x2
  start_steps: 0
  time_scale: 2.0        # ★ 从 4.0 改为 2.0，减弱时间特征的主导作用
  memory_mode: 'diversity'
  bank_size: 2048
  
  # DWR 算法内部参数
  dwr_lr: 0.01
  dwr_steps: 15
  
  # 权重控制
  clip_min: 0.6           # 保持不变
  clip_max: 1.4           # 保持不变
  alpha: 1.0              # 保持不变
  
  # 轨迹相关
  group_by_traj: False
  debug_print_freq: 200