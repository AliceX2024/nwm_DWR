run_name: nwm_cdit_xl

# evaluation setup
results_dir: /DATA/DATANAS2/xiaoyj25/projects/nwm/logs
train: False
batch_size: 64
num_workers: 12
model: CDiT-XL/2  # 使用 CDiT-XL 模型（与预训练权重匹配）
lr: 8e-5

# # normalization for the action space
# normalize: True
# grad_clip_val: 10.0
# context_size: 4  # 可以调整：2, 4, 8 等

# # distance bounds for distance and action and distance predictions 
# distance:
#   min_dist_cat: -64
#   max_dist_cat: 64

# # action output params
# len_traj_pred: 64  # 可以调整：16, 32, 64 等

# # dataset specific parameters
# image_size: 224
# datasets:
#   recon:
#     data_folder: data/recon
#     train: data_splits/recon/train/
#     test: data_splits/recon/test/
#     goals_per_obs: 4

# eval_datasets:
#   recon:
#     data_folder: data/recon          # 指向你的本地/软链数据
#     test: data_splits/recon/test/
#     goals_per_obs: 4
#   go_stanford:
#     data_folder: data/go_stanford          # 软链指向 /DATA/DATANAS2/xiaoyj25/go_stanford
#     test: data_splits/go_stanford/test/
#     goals_per_obs: 4


normalize: True
grad_clip_val: 10.0

# 3. 【核心】必须与微调训练时的设置一致
context_size: 4

distance:
  min_dist_cat: -64
  max_dist_cat: 64

# 推理预测长度
len_traj_pred: 64

image_size: 224

# ========== Planning 评估专用参数 ==========
# trajectory_eval 用于 planning 评估的时间步和距离参数
trajectory_eval_distance:
  min_dist_cat: 8
  max_dist_cat: 8
trajectory_eval_len_traj_pred: 8
trajectory_eval_context_size: 4
traj_stride: 16

# eval 相关参数（用于 isolated_nwm_infer.py 的 time/rollout 评估）
eval_distance:
  eval_min_dist_cat: -64
  eval_max_dist_cat: 64
eval_len_traj_pred: 64
eval_context_size: 4

# 数据集配置
datasets:
  recon:
    data_folder: data/recon
    train: data_splits/recon/train/
    test: data_splits/recon/test/
    goals_per_obs: 4
  tartan_drive:
    data_folder: data/tartan_drive
    train: my_data_splits/tartan_drive/train/
    test: my_data_splits/tartan_drive/test/
    goals_per_obs: 4
  sacson:
    data_folder: data/sacson
    train: my_data_splits/sacson/train
    test: my_data_splits/sacson/test
    goals_per_obs: 4
  scand:
    data_folder: data/scand
    train: my_data_splits/scand/train
    test: my_data_splits/scand/test
    goals_per_obs: 4

eval_datasets:
  recon:
    data_folder: data/recon
    test: data_splits/recon/test/
    goals_per_obs: 4
  go_stanford:
    data_folder: data/go_stanford
    test: data_splits/go_stanford/test/
    goals_per_obs: 4
  tartan_drive:
    data_folder: data/tartan_drive
    test: my_data_splits/tartan_drive/test/
    goals_per_obs: 4
  sacson:
    data_folder: data/sacson
    test: my_data_splits/sacson/test
    goals_per_obs: 4
  scand:
    data_folder: data/scand
    test: my_data_splits/scand/test
    goals_per_obs: 4
